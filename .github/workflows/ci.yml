name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n scripts/send-telegram.sh test/smoke.sh
      - name: Smoke test
        run: bash test/smoke.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - name: ShellCheck
        run: shellcheck scripts/send-telegram.sh test/smoke.sh
